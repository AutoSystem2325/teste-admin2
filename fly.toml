# fly.toml app configuration file generated for teste-admin2 on 2026-05-01T16:22:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'teste-admin2'
primary_region = 'gru'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  auto_start_machines = true
  auto_stop_machines = false
  force_https = true
  internal_port = 3000
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
